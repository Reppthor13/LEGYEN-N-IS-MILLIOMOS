<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Főoldal</title>
        <!--!Bootstrap-->
        <link rel="stylesheet" href="../bootstrap/css/bootstrap.min.css" />
        <!--?Popper: dropdowns, popovers, tooltips-->
        <script src="../bootstrap/js/popper.min.js"></script>
        <script src="../bootstrap/js/bootstrap.min.js"></script>
        <!--!CSS-->
        <link rel="stylesheet" href="../css/index.css" />
        <!--!JavaScript-->
        <script type="module" src="../javascript/index.js"></script>
        <script type="module" src="/ui/initcomponents.js"></script>
    </head>
    <body>
        <state-provider src="/api/game" id="mainstate" disable-auto-update>
            <state-provider as="user" src="/api/sessions" method="POST"></state-provider>

            <render-if state="user" when="!local.username">
                <h1>Be kell jelentkezni!</h1>
                <a href="/main">Belépés</a>
            </render-if>

            <render-if when="local.level">
                <span subscribe-to="level"></span><br>
                <span>Pémszint: <span subscribe-to="currentReward"></span></span>
            </render-if>

            <render-if state="user" when="local.username">
                <div class="container-fluid text-center">
                    <center>
                        <render-if when="!local.question && !local.ended">
                            <h3 subscribe-to="message"></h3>
                            <smart-form-wrapper
                                url="/api/game?action=start"
                                method="GET"
                                refresh-target="#mainstate"
                            >
                                <form>
                                    <button class="gomba">Indít/folytatás</button>
                                </form>
                            </smart-form-wrapper>
                        </render-if>

                        <render-if when="local.question">
                            <div class="row text-center" id="kerdesSpace">
                                <h1 stye="color: white" subscribe-to="question.id"></h1>
                                <h2 subscribe-to="question.kerdes" id="kerdesText">
                                    Ez egy kérdés
                                </h2>
                            </div>
                            <div class="row text-center" id="valaszSpace">
                                <collection-view items-source="answers" subscribe>
                                    <template>
                                        <div class="item">
                                            <smart-form-wrapper
                                                url="/api/game"
                                                method="POST"
                                                refresh-target="#mainstate"
                                            >
                                                <form>
                                                    <input
                                                        name="aid"
                                                        type="hidden"
                                                        data-bind="id"
                                                        bind-target="value"
                                                    />
                                                    <button>
                                                        <h2
                                                            class="valaszText"
                                                            data-bind="valasz"
                                                        ></h2>
                                                    </button>
                                                </form>
                                            </smart-form-wrapper>
                                        </div>
                                    </template>
                                </collection-view>
                            </div>
                        </render-if>

                        <render-if when="local.question">
                            <smart-form-wrapper
                                url="/api/game?action=abort"
                                method="GET"
                                refresh-target="#mainstate"
                            >
                                <form>
                                    <button class="gomba">Meksakít</button>
                                </form>
                            </smart-form-wrapper>
                        </render-if>

                        <render-if when="local.ended">
                            <span>A játék véget ért</span><br>
                            <span>QNyqERQ1ményqetQ:q <span subscribe-to="reward"></span></span>
                            <h3 subscribe-to="message"></h3>
                            <smart-form-wrapper
                                url="/api/game?action=start"
                                method="GET"
                                refresh-target="#mainstate"
                            >
                                <form>
                                    <button class="gomba">Új</button>
                                </form>
                            </smart-form-wrapper>
                        </render-if>

                        <render-if when="local.question">
                            <state-provider src="/api/help?type=tflon" disable-auto-update>
                                <smart-form-wrapper
                                    refresh-target="closest:state-provider"
                                    response-target="toast-manager"
                                    only-refresh
                                >
                                    <form>
                                        <button class="gomba">Telfonos segítség</button>
                                    </form>
                                </smart-form-wrapper>

                                <render-if when="local.id">
                                    <span>Eredmény:</span>
                                    <span subscribe-to="valasz"></span>
                                </render-if>
                            </state-provider>

                            <state-provider src="/api/help?type=kozonsek" disable-auto-update>
                                <smart-form-wrapper
                                    refresh-target="closest:state-provider"
                                    response-target="toast-manager"
                                    only-refresh
                                >
                                    <form>
                                        <button class="gomba">Közönséges segítség</button>
                                    </form>
                                </smart-form-wrapper>

                                <render-if when="local.suggested">
                                    <span>A közönség meklátása: </span>
                                    <collection-view items-source="other" subscribe>
                                        <template>
                                            <div>
                                                <span data-bind="valasz"></span>
                                                <span data-bind="vote"></span>
                                            </div>
                                        </template>
                                    </collection-view>
                                </render-if>
                            </state-provider>

                            <state-provider src="/api/help?type=505050" disable-auto-update>
                                <smart-form-wrapper
                                    url="/api/help?type=505050"
                                    method="GET"
                                    refresh-target="#mainstate"
                                    response-target="toast-manager"
                                >
                                    <form>
                                        <button class="gomba">Fiftutifitfi</button>
                                    </form>
                                </smart-form-wrapper>

                                <!-- <render-if when="local.possible">
                                    <span>maradék válaszog: </span>
                                    <collection-view items-source="possible" subscribe>
                                        <template>
                                            <div>
                                                <span data-bind="valasz"></span>
                                                <span data-bind="vote"></span>
                                            </div>
                                        </template>
                                    </collection-view>
                                </render-if> -->
                            </state-provider>
                        </render-if>

                        <!-- <input type="button" class="valaszText" value="Ez egy válasz" id="valasz"></input>
                        <input type="button" class="valaszText" value="Ez egy válasz" id="valasz"></input>
                        <input type="button" class="valaszText" value="Ez egy válasz" id="valasz"></input>
                        <input type="button" class="valaszText" id="valasz valasz4" value="Ez egy válasz"></input> -->
                    </center>
                </div>
            </render-if>
        </state-provider>

        <toast-manager></toast-manager>
    </body>
</html>
