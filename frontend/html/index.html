<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Főoldal</title>
        <!--!Bootstrap-->
        <link rel="stylesheet" href="../bootstrap/css/bootstrap.min.css" />
        <!--?Popper: dropdowns, popovers, tooltips-->
        <script src="../bootstrap/js/popper.min.js"></script>
        <script src="../bootstrap/js/bootstrap.min.js"></script>
        <!--!CSS-->
        <link rel="stylesheet" href="../css/index.css" />
        <!--!JavaScript-->
        <script type="module" src="../javascript/index.js"></script>
        <script type="module" src="/ui/initcomponents.js"></script>
    </head>
    <body>
        <state-provider src="/api/game" id="mainstate" disable-auto-update>
            <state-provider as="user" src="/api/sessions" method="POST"></state-provider>

            <render-if state="user" when="!local.username">
                <center><h1>Be kell jelentkezni!</h1></center>
                <center><a href="/main">Belépés</a></center>
            </render-if>

            <render-if when="local.level">
                <center>
                    <span>Szint: <span subscribe-to="level"></span> - <span subscribe-to="currentReward"></span> Ft</span><br>
                </center>
            </render-if>

            <render-if state="user" when="local.username">
                <div class="container-fluid text-center" id="gama">
                    <center>
                        <render-if when="!local.question && !local.ended">
                            <h3 subscribe-to="message"></h3>
                            <smart-form-wrapper
                                url="/api/game?action=start"
                                method="GET"
                                refresh-target="#mainstate"
                            >
                                <form>
                                    <button class="gomba">Indítás/folytatás</button>
                                </form>
                            </smart-form-wrapper>
                        </render-if>

                        <render-if when="local.question">
                            <div class="row text-center" id="kerdesSpace">
                                <!-- <h1 stye="color: white" subscribe-to="question.id"></h1> -->
                                <h2 subscribe-to="question.kerdes" id="kerdesText">
                                    Ez egy kérdés
                                </h2>
                            </div>
                            <div class="row text-center" id="valaszSpace">
                                <collection-view items-source="answers" id="kerdojel" subscribe>
                                    <template>
                                        <div class="item">
                                            <smart-form-wrapper
                                                url="/api/game"
                                                method="POST"
                                                refresh-target="#mainstate"
                                                id="kerdeses"
                                            >
                                                <form>
                                                    <input
                                                        name="aid"
                                                        type="hidden"
                                                        data-bind="id"
                                                        bind-target="value"
                                                    />
                                                    <button id="valasz">
                                                        <h2
                                                            class="valaszText"
                                                            data-bind="valasz"
                                                        ></h2>
                                                    </button>
                                                </form>
                                            </smart-form-wrapper>
                                        </div>
                                    </template>
                                </collection-view>
                            </div>
                        </render-if>

                        <render-if when="local.question">
                            <smart-form-wrapper
                                url="/api/game?action=abort"
                                method="GET"
                                refresh-target="#mainstate"
                            >
                                <form>
                                    <button class="gomba">Mekszakítás</button>
                                </form>
                            </smart-form-wrapper>
                        </render-if>

                        <render-if when="local.ended">
                            <span>A játék véget ért</span><br>
                            <span>Nyereményed: <span subscribe-to="reward"></span></span>
                            <h3 subscribe-to="message"></h3>
                            <smart-form-wrapper
                                url="/api/game?action=start"
                                method="GET"
                                refresh-target="#mainstate"
                            >
                                <form>
                                    <button class="gomba">Új játék</button>
                                </form>
                            </smart-form-wrapper>
                        </render-if>

                        <render-if when="local.question" class="renderif_1">
                            <state-provider src="/api/help?type=tflon" disable-auto-update>
                                <smart-form-wrapper
                                    refresh-target="closest:state-provider"
                                    response-target="toast-manager"
                                    only-refresh
                                >
                                    <form>
                                        <button onclick="fonungLCick()" class="gomba segicsek"><img src="/images/hTawo.jpg">Telfonos segítség</button>
                                    </form>
                                </smart-form-wrapper>

                                <render-if when="local.id">
                                    <span>Eredmény:</span>
                                    <span subscribe-to="valasz"></span>
                                </render-if>
                            </state-provider>

                            <state-provider src="/api/help?type=kozonsek" disable-auto-update>
                                <smart-form-wrapper
                                    refresh-target="closest:state-provider"
                                    response-target="toast-manager"
                                    only-refresh
                                >
                                    <form>
                                        <button  onclick="kozonsekCilck()" class="gomba segicsek"><img src="/images/hIOmJ.jpg">Közönséges segítség</button>
                                    </form>
                                </smart-form-wrapper>

                                <render-if when="local.suggested">
                                    <span>A közönség meklátása: </span>
                                    <collection-view items-source="other" subscribe>
                                        <template>
                                            <div>
                                                <span data-bind="valasz"></span>
                                                <span data-bind="vote"></span>
                                            </div>
                                        </template>
                                    </collection-view>
                                </render-if>
                            </state-provider>

                            <state-provider src="/api/help?type=505050" disable-auto-update>
                                <smart-form-wrapper
                                    url="/api/help?type=505050"
                                    method="GET"
                                    refresh-target="#mainstate"
                                    response-target="toast-manager"
                                >
                                    <form>
                                        <button onclick="onFiftutifitfiLclik()" class="gomba segicsek"><img src="/images/qMoLW.jpg">Fiftutifitfi</button>
                                    </form>
                                </smart-form-wrapper>
                            </state-provider>
                        </render-if>
                    </center>
                </div>
            </render-if>
        </state-provider>

        <toast-manager></toast-manager>

        <audio src="/images/krokett.mp3" id="correctSound"></audio>
        <audio src="/images/incorrectBuzzer.mp3" id="incorrectSound"></audio>
        <audio src="/images/5cet.mp3" id="cent"></audio>
        <audio src="/images/telfon.mp3" id="telefon"></audio>
        <audio src="/images/crowd.mp3" id="crowsSound"></audio>

        <script>
            const croect = document.querySelector("#correctSound");
            const incorectBusser = document.querySelector("#incorrectSound");
            const cet = document.querySelector("#cent");
            const telfon = document.querySelector("#telefon")
            const crowd = document.querySelector("#crowsSound");

            const audioCtx = new AudioContext();

            const fitfiSouce = audioCtx.createMediaElementSource(cet);
            const gainNode = audioCtx.createGain();
            gainNode.gain.value = 0.25;
            fitfiSouce.connect(gainNode).connect(audioCtx.destination);

            const telefonSource = audioCtx.createMediaElementSource(telfon);
            telefonSource.connect(audioCtx.destination);

            const correctNode = audioCtx.createMediaElementSource(croect);
            correctNode.connect(audioCtx.destination);

            const buzzerNode = audioCtx.createMediaElementSource(incorectBusser);
            buzzerNode.connect(audioCtx.destination)

            function onFiftutifitfiLclik() {
                if (audioCtx.state === "suspended") {
                    audioCtx.resume();
                }

                cet.play();
            }

            function kozonsekCilck() {
                if (audioCtx.state === "suspended") {
                    audioCtx.resume();
                }

                // telfon.play();
            }

            function fonungLCick() {
                if (audioCtx.state === "suspended") {
                    audioCtx.resume();
                }

                telfon.play();
            }

            document.addEventListener("response", (e) => {
                if (audioCtx.state === "suspended") {
                    audioCtx.resume()
                }

                const response = e?.detail?.response;
                if (!response) return;

                if (response?.result?.success) {
                    croect.play();
                    console.log("CORRECT PLAYED")
                } else if (response?.result?.success === false) {
                    incorectBusser.play();
                    console.log("INCORRECT BZER")
                }
            })
        </script>
    </body>
</html>
