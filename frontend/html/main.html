<!DOCTYPE html>
<html lang="hu">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Bejelentkezés</title>
        <!--!Bootstrap-->
        <link rel="stylesheet" href="../bootstrap/css/bootstrap.min.css" />
        <!--?Popper: dropdowns, popovers, tooltips-->
        <script src="../bootstrap/js/popper.min.js"></script>
        <script src="../bootstrap/js/bootstrap.min.js"></script>
        <!--!CSS-->
        <link rel="stylesheet" href="../css/main.css" />
        <!--!JavaScript-->
        <script src="../javascript/main.js"></script>
        <script type="module" src="/ui/initcomponents.js"></script>
    </head>
    <body>
        <center>

        <form id="registerForm" class="forms">
            <h2>Regisztráció</h2>
            <input name="username" placeholder="Username" />
            <input name="display_name" placeholder="Display name" />
            <input name="password" type="password" placeholder="Password" />
            <input name="passwordConfirm" type="password" placeholder="Password" />
            <button type="submit" class="gonb">Regisztráció</button>
            <toggle-button target=".forms"><button class="gonb" type="button">Bejelentkezés</button></toggle-button>
            <hr/>
        </form>

        <form id="loginForm" class="forms" hidden>
            <h2>Bejelentkezés</h2>
            <input name="username" placeholder="Username" required />
            <input name="password" type="password" placeholder="Password" required />
            <button type="submit" class="gonb">Bejelentkezés</button>
            <toggle-button target=".forms"><button class="gonb" type="button">Regisztrálás</button></toggle-button>
            <hr/>
        </form>


        <button id="logoutBtn" class="gonb">Kijelentkezés</button>
        <button id="deleteBtn" class="gonb">Profil törlése</button></center>

        <!--<hr />

        <h3>Válasz</h3>
        <pre id="result"></pre>

        <script>
            const API = 'http://localhost:3000';

            function show(data) {
                document.getElementById('result').textContent = JSON.stringify(data, null, 2);
            }

            document.getElementById('registerForm').addEventListener('submit', async (e) => {
                e.preventDefault();

                const formData = new FormData(e.target);

                const res = await fetch('/api/users', {
                    method: 'POST',
                    credentials: 'include',
                    body: formData
                });

                const data = await res.json();
                show(data);
            });

            document.getElementById('loginForm').addEventListener('submit', async (e) => {
                e.preventDefault();

                const formData = new FormData(e.target);

                const res = await fetch('/api/sessions', {
                    method: 'POST',
                    credentials: 'include',
                    body: formData
                });

                const data = await res.json();
                show(data);
            });

            document.getElementById('logoutBtn').addEventListener('click', async () => {
                const res = await fetch('/api/sessions', {
                    method: 'DELETE',
                    credentials: 'include'
                });

                const data = await res.json();
                show(data);
            });

            document.getElementById('deleteBtn').addEventListener('click', async () => {
                const res = await fetch('/api/users', {
                    method: 'DELETE',
                    credentials: 'include'
                });

                const data = await res.json();
                show(data);
            });
        </script>
    </body>
</html>
