<!doctype html>
<html lang="hu">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Bejelentkezés</title>
        <!--!Bootstrap-->
        <link rel="stylesheet" href="../bootstrap/css/bootstrap.min.css" />
        <link rel="stylesheet" href="/ui/style/toasts.css" />
        <!--?Popper: dropdowns, popovers, tooltips-->
        <script src="../bootstrap/js/popper.min.js"></script>
        <script src="../bootstrap/js/bootstrap.min.js"></script>
        <!--!CSS-->
        <link rel="stylesheet" href="../css/main.css" />
        <!--!JavaScript-->
        <script src="../javascript/main.js"></script>
        <script type="module" src="/ui/initcomponents.js"></script>
    </head>
    <body>
        <a href="/">Főoldal</a>
        <center>
            <form id="registerForm" class="forms">
                <h2>Regisztráció</h2>
                <input name="username" placeholder="Username" />
                <input name="display_name" placeholder="Display name" />
                <input name="password" type="password" placeholder="Password" />
                <input name="passwordConfirm" type="password" placeholder="Password" />
                <button type="submit" class="gonb">Regisztráció</button>
                <toggle-button target=".forms"
                    ><button style="border: none; background: none" type="button">
                        Már van fiókod? Jelentkezz be
                    </button></toggle-button
                >
                <hr />
            </form>

            <form id="loginForm" class="forms" hidden>
                <h2>Bejelentkezés</h2>
                <input name="username" placeholder="Username" required />
                <input name="password" type="password" placeholder="Password" required />
                <button type="submit" class="gonb">Bejelentkezés</button>
                <toggle-button target=".forms"
                    ><button style="border: none; background: none" type="button">
                        Még nincs fiókod? regisztrálj
                    </button></toggle-button
                >
                <hr />
            </form>

            <button id="deleteBtn" class="gonb">Profil törlése</button>
        </center>

        <toast-manager></toast-manager>

        <script>
            const API = 'http://localhost:3000';

            function show(data) {
                document.getElementById('result').textContent = JSON.stringify(data, null, 2);
            }

            document.getElementById('registerForm').addEventListener('submit', async (e) => {
                e.preventDefault();

                const formData = new FormData(e.target);

                const res = await fetch('/api/users', {
                    method: 'POST',
                    credentials: 'include',
                    body: formData
                });

                const data = await res.json();

                if (data?.success) {
                    document.querySelector('toggle-button').toggle();
                }

                document.querySelector('toast-manager')?.schedule(data.message, 0);
            });

            document.getElementById('loginForm').addEventListener('submit', async (e) => {
                e.preventDefault();

                const formData = new FormData(e.target);

                const res = await fetch('/api/sessions', {
                    method: 'POST',
                    credentials: 'include',
                    body: formData
                });

                const data = await res.json();

                if (data?.success) {
                    if (!window.Game) window.Game = {};
                    window.Game.user = data.result;
                    window.location.href = '/';
                }

                document.querySelector('toast-manager')?.schedule(data.message, 0);
            });

            // document.getElementById('logoutBtn').addEventListener('click', async () => {
            //     const res = await fetch('/api/sessions', {
            //         method: 'DELETE',
            //         credentials: 'include'
            //     });

            //     const data = await res.json();

            //     document.querySelector('toast-manager')?.schedule(data.message, 0);
            // });

            document.getElementById('deleteBtn').addEventListener('click', async () => {
                const res = await fetch('/api/users', {
                    method: 'DELETE',
                    credentials: 'include'
                });

                const data = await res.json();

                if (data?.success) {
                    window.location.href = '/main';
                }

                document.querySelector('toast-manager')?.schedule(data.message, 0);
            });
        </script>
    </body>
</html>
